<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=380">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Header -->
  <header id="header">
    <div class="header-left">
      <span class="logo">Shock</span><span class="logo-accent">TEST</span>
    </div>
    <div class="header-right">
      <span class="status-dot" id="status-dot" title="Disconnected"></span>
      <button id="btn-refresh" class="icon-btn" title="Refresh">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
      </button>
      <button id="btn-settings" class="icon-btn" title="Settings">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Loading state with skeleton -->
  <div id="loading">
    <div class="skeleton skeleton-finding"></div>
    <div class="skeleton skeleton-stats"></div>
    <div style="padding: 12px 14px 6px;">
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
    </div>
  </div>

  <!-- Error state -->
  <div id="error" class="state-message" hidden>
    <span class="error-icon">!</span>
    <span id="error-msg">Could not connect to ShockTest API.</span>
    <button id="btn-retry" class="btn-small">Retry</button>
  </div>

  <!-- Main content (hidden until loaded) -->
  <main id="content" hidden>
    <!-- Key finding -->
    <section id="key-finding" class="card finding-card">
      <div class="finding-rate" id="reversion-rate">&mdash;</div>
      <div class="finding-label">of shocks revert within 6 hours</div>
      <div class="finding-meta" id="finding-meta"></div>
    </section>

    <!-- Last updated -->
    <div class="last-updated" id="last-updated"></div>

    <!-- Stats strip -->
    <section class="stats-strip">
      <div class="stat-item">
        <span class="stat-value" id="stat-shocks">&mdash;</span>
        <span class="stat-label">Shocks</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="stat-markets">&mdash;</span>
        <span class="stat-label">Markets</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="stat-winrate">&mdash;</span>
        <span class="stat-label">Win Rate</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="stat-mean">&mdash;</span>
        <span class="stat-label">Mean Rev</span>
      </div>
    </section>

    <!-- Live shocks -->
    <section class="shocks-section">
      <h2 class="section-title">
        <span class="live-dot"></span>
        Recent Shocks
      </h2>
      <div id="shocks-list"></div>
      <div id="no-shocks" class="state-message small" hidden>
        No recent shocks detected.
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer id="footer" hidden>
    <button id="btn-dashboard" class="btn-dashboard">Open Full Dashboard</button>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
